<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 16 - Bộ đếm tương tác</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #counter { font-size: 48px; font-weight: bold; margin: 20px; color: gray; }
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; border: none; border-radius: 5px; }
        .btn-inc { background-color: #28a745; color: white; }
        .btn-dec { background-color: #dc3545; color: white; }
        .btn-reset { background-color: #6c757d; color: white; }
        .btn-fast { background-color: #17a2b8; color: white; }
        .positive { color: #28a745 !important; }
        .negative { color: #dc3545 !important; }
    </style>
</head>
<body>

    <h2>Bộ Đếm Lượt Tương Tác</h2>
    <div id="counter">0</div>
    
    <button class="btn btn-dec" id="btn-decrease">Giảm (-1)</button>
    <button class="btn btn-reset" id="btn-reset">Đặt lại</button>
    <button class="btn btn-inc" id="btn-increase">Tăng (+1)</button>
    <button class="btn btn-fast" id="btn-fast-increase">Tăng nhanh (+10)</button>

    <script>
        $(document).ready(function() {
            // 2. Khai báo biến trạng thái [cite: 14]
            let count = 0;

            // Hàm cập nhật giao diện và đổi màu theo giá trị âm/dương (Yêu cầu mở rộng) [cite: 14, 18]
            function updateUI() {
                $('#counter').text(count); // Cập nhật ngay số đếm [cite: 8]

                // Xóa class màu cũ
                $('#counter').removeClass('positive negative');

                // Thêm class màu mới dựa trên giá trị [cite: 18]
                if (count > 0) {
                    $('#counter').addClass('positive');
                } else if (count < 0) {
                    $('#counter').addClass('negative');
                }
            }

            // 3. Gắn sự kiện cho các nút [cite: 15]
            $('#btn-increase').click(function() {
                count++;
                updateUI();
            });

            $('#btn-decrease').click(function() {
                // Quy tắc: Cho phép giảm xuống số âm [cite: 9]
                count--;
                updateUI();
            });

            $('#btn-reset').click(function() {
                count = 0;
                updateUI();
            });

            // Yêu cầu mở rộng: Nút tăng nhanh thêm 10 đơn vị [cite: 18]
            $('#btn-fast-increase').click(function() {
                count += 10;
                updateUI();
            });
        });
    </script>
</body>
</html>
