<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài lab 23: Danh sách sản phẩm dạng lưới</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Đảm bảo tất cả các ảnh card có chiều cao bằng nhau và không bị méo */
      .custom-img {
        height: 200px;
        object-fit: cover;
      }
      /* Hiệu ứng bóng đổ nhẹ khi di chuột vào sản phẩm */
      .card {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15) !important;
      }
    </style>
  </head>
  <body class="bg-light py-5">
    <div class="container">
      <h2 class="text-center fw-bold mb-2">DANH SÁCH SẢN PHẨM KHUYẾN MÃI</h2>
      <p class="text-center text-muted mb-5">
        Hệ thống lưới tự động tương thích Responsive (Mobile, Tablet, Desktop)
      </p>

      <div class="row g-4" id="productGrid"></div>
    </div>

    <script>
      // Mảng chứa dữ liệu của 6 sản phẩm mẫu với đường dẫn ảnh công nghệ chuẩn, sắc nét
      const products = [
        {
          title: "Laptop Cấu Hình Cao Asus ROG",
          price: "24.490.000đ",
          oldPrice: "27.900.000đ",
          img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500&auto=format&fit=crop",
          badge: "Hot -15%",
        },
        {
          title: "Điện thoại Thông Minh iPhone 15 Pro",
          price: "28.990.000đ",
          oldPrice: "31.000.000đ",
          img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=500&auto=format&fit=crop",
          badge: "Bán chạy",
        },
        {
          title: "Tai Nghe Chống Ồn Không Dây",
          price: "4.200.000đ",
          oldPrice: "",
          img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&auto=format&fit=crop",
          badge: "Mới về",
        },
        {
          title: "Bàn Phím Cơ Gaming RGB Cáp Rời",
          price: "1.850.000đ",
          oldPrice: "2.250.000đ",
          img: "https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=500&auto=format&fit=crop",
          badge: "Giảm 20%",
        },
        {
          title: "Chuột Máy Tính Không Dây Ergonomic",
          price: "950.000đ",
          oldPrice: "",
          img: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=500&auto=format&fit=crop",
          badge: "",
        },
        {
          title: "Màn Hình Đồ Họa Chuyên Dụng 4K",
          price: "8.800.000đ",
          oldPrice: "9.500.000đ",
          img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=500&auto=format&fit=crop",
          badge: "Đánh giá tốt",
        },
      ];

      let htmlContent = "";
      products.forEach((p) => {
        htmlContent += `
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0 position-relative">
                ${p.badge ? `<span class="position-absolute top-0 start-0 m-3 badge bg-danger z-3 shadow-sm">${p.badge}</span>` : ""}
                
                <img src="${p.img}" class="card-img-top custom-img rounded-top-3" alt="${p.title}">
                
                <div class="card-body d-flex flex-column p-4">
                    <h5 class="card-title fw-bold text-dark fs-6 mb-2">${p.title}</h5>
                    
                    <div class="my-2 mb-3">
                        <span class="text-primary fw-bold fs-5">${p.price}</span>
                        ${p.oldPrice ? `<span class="text-muted text-decoration-line-through small ms-2">${p.oldPrice}</span>` : ""}
                    </div>
                    
                    <button class="btn btn-primary w-100 mt-auto fw-bold py-2 shadow-sm">Thêm vào giỏ hàng</button>
                </div>
            </div>
        </div>
    `;
      });

      // Xuất toàn bộ chuỗi HTML vào thẻ div chính
      document.getElementById("productGrid").innerHTML = htmlContent;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
