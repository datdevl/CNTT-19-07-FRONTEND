<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài lab 22: Form đăng nhập Bootstrap 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center"
    style="min-height: 100vh"
  >
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
          <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">
              <h3 class="text-center mb-4 fw-bold text-primary">ĐĂNG NHẬP</h3>

              <form>
                <div class="mb-3">
                  <label for="emailInput" class="form-label fw-semibold"
                    >Địa chỉ Email</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="emailInput"
                    placeholder="name@example.com"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="passInput" class="form-label fw-semibold"
                    >Mật khẩu</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="passInput"
                    placeholder="••••••••"
                    required
                  />
                </div>

                <div
                  class="mb-4 d-flex justify-content-between align-items-center"
                >
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="rememberCheck"
                    />
                    <label
                      class="form-check-label text-muted small"
                      for="rememberCheck"
                      >Ghi nhớ tài khoản</label
                    >
                  </div>
                  <a href="#" class="text-decoration-none small text-danger"
                    >Quên mật khẩu?</a
                  >
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 fw-bold shadow-sm"
                >
                  Đăng Nhập Hệ Thống
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
