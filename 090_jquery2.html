<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 17 - Giỏ Hàng</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .cart { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .img-sp { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .info { flex: 1; margin-left: 15px; }
        .qty-btn { width: 30px; height: 30px; cursor: pointer; }
        .qty-input { width: 40px; text-align: center; height: 26px; }
        .total { text-align: right; margin-top: 20px; font-size: 1.2em; font-weight: bold; color: red; }
    </style>
</head>
<body>
<div class="cart">
    <h2>Giỏ Hàng</h2>
    <div class="item" data-price="150000">
        <img class="img-sp" src="https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=100">
        <div class="info">
            <div><b>Bàn phím cơ</b></div>
            <div>Giá: 150.000đ</div>
        </div>
        <div>
            <button class="qty-btn btn-down">-</button>
            <input type="text" class="qty-input" value="1" readonly>
            <button class="qty-btn btn-up">+</button>
        </div>
        <div style="width: 120px; text-align: right;">
            <span class="subtotal">150000</span>đ
        </div>
    </div>
    <div class="item" data-price="250000">
        <img class="img-sp" src="https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=100">
        <div class="info">
            <div><b>Chuột Gaming</b></div>
            <div>Giá: 250.000đ</div>
        </div>
        <div>
            <button class="qty-btn btn-down">-</button>
            <input type="text" class="qty-input" value="1" readonly>
            <button class="qty-btn btn-up">+</button>
        </div>
        <div style="width: 120px; text-align: right;">
            <span class="subtotal">250000</span>đ
        </div>
    </div>
    <div class="total">Tổng tiền: <span id="grand-total">400000</span>đ</div>
</div>
<script>
$(document).ready(function() {
    function tinhTongTien() {
        let tong = 0;
        $('.item').each(function() {
            let giaSp = parseInt($(this).attr('data-price'));
            let soLuongSp = parseInt($(this).find('.qty-input').val());
            let thanhTienSp = giaSp * soLuongSp;
            tong += thanhTienSp;
            $(this).find('.subtotal').text(thanhTienSp);
        });
        $('#grand-total').text(tong);
    }
    $('.btn-up').click(function() {
        let oNhap = $(this).siblings('.qty-input');
        oNhap.val(parseInt(oNhap.val()) + 1);
        tinhTongTien();
    });
    $('.btn-down').click(function() {
        let oNhap = $(this).siblings('.qty-input');
        let giaTriHienTai = parseInt(oNhap.val());
        if (giaTriHienTai > 0) {
            oNhap.val(giaTriHienTai - 1);
            tinhTongTien();
        }
    });
});
</script>
</body>
</html>
