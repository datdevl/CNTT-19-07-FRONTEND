<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý thành viên Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        body{
            background:#f4f6f9;
            font-family:Arial;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .member-item:hover{
            background:#f8f9fa;
            transform:translateX(5px);
            transition:0.2s;
        }

        .empty-state{
            text-align:center;
            color:#6c757d;
            padding:30px;
            display:none;
        }

        .counter{
            font-size:18px;
            font-weight:bold;
            color:#0d6efd;
        }

        .toast-box{
            position:fixed;
            top:20px;
            right:20px;
            z-index:9999;
        }

        .custom-toast{
            background:#198754;
            color:white;
            padding:10px 15px;
            margin-top:10px;
            border-radius:8px;
            display:none;
        }
    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card p-4">

                <h2 class="text-center text-primary mb-4">
                    Quản Lý Thành Viên
                </h2>

                <!-- Search -->
                <input type="text" id="searchInput"
                       class="form-control mb-3"
                       placeholder="Tìm kiếm thành viên...">

                <!-- Input -->
                <div class="input-group mb-3">

                    <input type="text" id="memberInput"
                           class="form-control"
                           placeholder="Nhập tên thành viên">

                    <button class="btn btn-primary" id="btnAdd">
                        Thêm
                    </button>

                </div>

                <!-- Counter -->
                <div class="counter mb-3">
                    Tổng thành viên:
                    <span id="memberCount">0</span>
                </div>

                <!-- List -->
                <ul class="list-group" id="memberList"></ul>

                <!-- Empty -->
                <div class="empty-state">
                    Chưa có thành viên nào 😢
                </div>

            </div>

        </div>

    </div>

</div>

<div class="toast-box"></div>

<script>

$(document).ready(function(){

    const STORAGE_KEY = "members_data";

    const $memberInput = $("#memberInput");
    const $memberList = $("#memberList");

    // ===== TOAST =====
    function showToast(msg){

        const toast = $(`
            <div class="custom-toast">${msg}</div>
        `);

        $(".toast-box").append(toast);

        toast.fadeIn(200).delay(1200).fadeOut(300, function(){
            $(this).remove();
        });

    }

    // ===== SAVE =====
    function saveData(){

        let data = [];

        $(".member-item").each(function(){

            let name = $(this).find(".member-name").text().trim();

            data.push(name);

        });

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    }

    // ===== COUNTER =====
    function updateCounter(){
        $("#memberCount").text($(".member-item").length);
    }

    // ===== EMPTY CHECK =====
    function checkEmpty(){

        if($(".member-item").length === 0){
            $(".empty-state").fadeIn();
        }else{
            $(".empty-state").hide();
        }

    }

    // ===== ADD ITEM =====
    function addMemberToList(name){

        const html = `
        <li class="list-group-item d-flex justify-content-between align-items-center member-item">

            <span class="member-name fw-bold">${name}</span>

            <div>

                <button class="btn btn-warning btn-sm btn-edit">
                    Sửa
                </button>

                <button class="btn btn-danger btn-sm btn-delete">
                    Xóa
                </button>

            </div>

        </li>`;

        $memberList.append(html);

    }

    // ===== REFRESH UI =====
    function refreshUI(){
        saveData();
        updateCounter();
        checkEmpty();
    }

    // ===== LOAD DATA =====
    function loadData(){

        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        $memberList.empty();

        data.forEach(name => addMemberToList(name));

        updateCounter();
        checkEmpty();

    }

    // ===== ADD =====
    function addMember(){

        let name = $memberInput.val().trim();

        if(name === ""){
            alert("Vui lòng nhập tên!");
            return;
        }

        addMemberToList(name);

        $memberInput.val("").focus();

        refreshUI();

        showToast("Đã thêm thành viên");

    }

    $("#btnAdd").click(addMember);

    $memberInput.keypress(function(e){
        if(e.which === 13){
            addMember();
        }
    });

    // ===== DELETE =====
    $memberList.on("click", ".btn-delete", function(){

        if(confirm("Xóa thành viên?")){

            $(this).closest(".member-item").remove();

            refreshUI();

            showToast("Đã xóa");

        }

    });

    // ===== EDIT =====
    $memberList.on("click", ".btn-edit", function(){

        let $item = $(this).closest(".member-item");
        let $name = $item.find(".member-name");
        let $btn = $(this);

        if($btn.hasClass("btn-save")){

            let newName = $item.find(".edit-input").val().trim();

            if(newName === ""){alert("Không được rỗng");
                return;
            }

            $name.text(newName);

            $btn.text("Sửa")
                .removeClass("btn-success btn-save")
                .addClass("btn-warning");

            refreshUI();

            showToast("Đã cập nhật");

        }else{

            let current = $name.text();

            $name.html(`
                <input type="text"
                       class="form-control edit-input"
                       value="${current}">
            `);

            $btn.text("Lưu")
                .removeClass("btn-warning")
                .addClass("btn-success btn-save");

        }

    });

    // ===== SEARCH =====
    $("#searchInput").on("keyup", function(){

        let keyword = $(this).val().toLowerCase();

        $(".member-item").each(function(){

            if($(this).find(".edit-input").length > 0) return;

            let text = $(this).text().toLowerCase();

            $(this).toggle(text.indexOf(keyword) > -1);

        });

    });

    // INIT
    loadData();

});

</script>

</body>

</html>
