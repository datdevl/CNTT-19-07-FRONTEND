<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 17 - Giỏ hàng</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .quantity-input { width: 40px; text-align: center; font-size: 16px; margin: 0 5px; }
        .btn-qty { padding: 5px 10px; cursor: pointer; }
        .total-cart { font-size: 20px; font-weight: bold; text-align: right; color: #d9534f; }
    </style>
</head>
<body>

    <h2>Giỏ Hàng Của Bạn</h2>
    <table>
        <thead>
            <tr>
                <th>Sản phẩm</th>
                <th>Đơn giá (đ)</th>
                <th>Số lượng</th>
                <th>Thành tiền (đ)</th>
            </tr>
        </thead>
        <tbody>
            <tr class="cart-item" data-price="150000">
                <td>Áo thun Local Brand</td>
                <td class="price">150,000</td>
                <td>
                    <button class="btn-qty btn-minus">-</button>
                    <input type="text" class="quantity-input" value="1" readonly>
                    <button class="btn-qty btn-plus">+</button>
                </td>
                <td class="subtotal">150,000</td>
            </tr>
            <tr class="cart-item" data-price="250000">
                <td>Quần Jean baggy</td>
                <td class="price">250,000</td>
                <td>
                    <button class="btn-qty btn-minus">-</button>
                    <input type="text" class="quantity-input" value="1" readonly>
                    <button class="btn-qty btn-plus">+</button>
                </td>
                <td class="subtotal">250,000</td>
            </tr>
        </tbody>
    </table>

    <div class="total-cart">Tổng hóa đơn: <span id="cart-total">400,000</span> đ</div>

    <script>
        $(document).ready(function() {
            
            // Hàm tính toán và cập nhật tiền của từng sản phẩm và cả giỏ hàng [cite: 26, 32]
            function updateCart() {
                let totalCart = 0;

                $('.cart-item').each(function() {
                    // 2. Lấy đơn giá ban đầu từ thuộc tính data-price [cite: 30]
                    let price = parseInt($(this).attr('data-price'));
                    let quantity = parseInt($(this).find('.quantity-input').val());
                    
                    // Tính thành tiền từng dòng [cite: 26]
                    let subtotal = price * quantity;
                    $(this).find('.subtotal').text(subtotal.toLocaleString('vi-VN'));

                    // Tích lũy vào tổng giỏ hàng 
                    totalCart += subtotal;
                });

                // Cập nhật giao diện tổng tiền giỏ hàng [cite: 32, 34]
                $('#cart-total').text(totalCart.toLocaleString('vi-VN'));
            }

            // 3. Xử lý sự kiện tăng số lượng [cite: 25, 31]
            $('.btn-plus').click(function() {
                let input = $(this).siblings('.quantity-input');
                let currentVal = parseInt(input.val());
                input.val(currentVal + 1);
                updateCart(); // Tính lại tiền [cite: 32]
            });

            // 3. Xử lý sự kiện giảm số lượng [cite: 25, 31]
            $('.btn-minus').click(function() {
                let input = $(this).siblings('.quantity-input');
                let currentVal = parseInt(input.val());
                
                // Quy ước: Không cho phép số lượng nhỏ hơn 1 [cite: 27]
                if (currentVal > 1) {
                    input.val(currentVal - 1);
                    updateCart(); // Tính lại tiền [cite: 32]
                }
            });
        });
    </script>
</body>
</html>
