<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 16 - Bộ đếm</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .Duong { color: green; }
        .Am { color: red; }
        .Khong { color: black; }
    </style>
</head>
<body>
    <div class="container-lab16">
        <h2>Bộ đếm tương tác</h2>
        <h1 id="HienThiBoDem" class="Khong">0</h1>
        <div class="NhomNut">
            <button id="NutGiam">-1</button>
            <button id="NutDatLai">Đặt lại</button>
            <button id="NutTang">+1</button>
            <button id="NutTang10">+10</button>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            let count = 0; 
            function updateDisplay() {
                $('#HienThiBoDem').text(count); 
                if (count > 0) {
                    $('#HienThiBoDem').removeClass('Am Khong').addClass('Duong');
                } else if (count < 0) {
                    $('#HienThiBoDem').removeClass('Duong Khong').addClass('Am');
                } else {
                    $('#HienThiBoDem').removeClass('Duong Am').addClass('Khong');
                }
            }
            $('#NutTang').click(function() { count++; updateDisplay(); }); 
            $('#NutGiam').click(function() { count--; updateDisplay(); }); 
            $('#NutTang10').click(function() { count += 10; updateDisplay(); });
            $('#NutDatLai').click(function() { count = 0; updateDisplay(); }); 
        });
    </script>
</body>
</html>
