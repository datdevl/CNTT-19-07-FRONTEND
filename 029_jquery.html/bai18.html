<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 18 - Quản lý thành viên</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Danh sách thành viên</h2>
    <div class="member-container">
        <h2>Danh sách thành viên</h2>
        <div class="member-controls">
            <input type="text" id="TenThanhVien" placeholder="Nhập tên thành viên..."> 
            <button id="NutThem">Thêm</button> 
        </div>
        <ul id="DanhSachThanhVien"></ul>
    </div>
    <script>
        $(document).ready(function() {
            $('#NutThem').click(function() {
                let Ten = $('#TenThanhVien').val().trim();
                if (Ten !== "") {
                    let li = `
                        <li class="ThanhVienItem">
                            <span class="HienThiTen">${Ten}</span>
                            <input type="text" class="NhapSua" value="${Ten}" style="display:none;">
                            <button class="NutSua">Sửa</button>
                            <button class="NutLuu" style="display:none;">Lưu</button>
                            <button class="NutXoa">Xóa</button>
                        </li>
                    `;
                    $('#DanhSachThanhVien').append(li); 
                    $('#TenThanhVien').val('');
                } else {
                    alert("Vui lòng nhập tên thành viên trước khi bấm Thêm!");
                }
            });
            $('#TenThanhVien').keypress(function(e) {
                if (e.which == 13) {
                    $('#NutThem').click();
                }
            });
            $('#DanhSachThanhVien').on('click', '.NutXoa', function() {
                if (confirm("Bạn có chắc chắn muốn xóa thành viên này không?")) {
                    $(this).closest('.ThanhVienItem').remove(); 
                }
            });
            $('#DanhSachThanhVien').on('click', '.NutSua', function() {
                let item = $(this).closest('.ThanhVienItem');
                item.find('.HienThiTen').hide();
                $(this).hide();
                item.find('.NhapSua').show().focus();
                item.find('.NutLuu').show();
            });
            $('#DanhSachThanhVien').on('click', '.NutLuu', function() {
                let item = $(this).closest('.ThanhVienItem');
                let newName = item.find('.NhapSua').val().trim();
                if (newName !== "") {
                    item.find('.HienThiTen').text(newName).show();
                    item.find('.NhapSua').hide();
                    $(this).hide();
                    item.find('.NutSua').show();
                } else {
                    alert("Tên thành viên không được để trống!");
                }
            });
            $('#DanhSachThanhVien').on('keypress', '.NhapSua', function(e) {
                if (e.which == 13) {
                    $(this).closest('.ThanhVienItem').find('.NutLuu').click();
                }
            });
        });
    </script>
</body>
</html>
