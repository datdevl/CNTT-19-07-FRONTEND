<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 16 – Bộ Đếm Lượt Tương Tác</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #e0e0e0;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 3rem 3.5rem;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .lab-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    border: 1px solid #2a2a2a;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-size: 1.05rem;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 2.5rem;
  }

  .counter-ring {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 0 auto 2.5rem;
  }
  .counter-ring svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .counter-ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #counter-value {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    transition: color 0.4s;
    color: #fff;
  }
  #counter-status {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-top: 4px;
    transition: color 0.4s;
  }

  .ring-track { fill: none; stroke: #222; stroke-width: 8; }
  #ring-progress {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    transition: stroke-dashoffset 0.4s ease, stroke 0.4s;
    stroke: #00e5a0;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn-wide { grid-column: span 2; }

  .ctrl-btn {
    padding: 0.75rem;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    background: #141414;
    color: #ccc;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .ctrl-btn:hover { border-color: #444; color: #fff; background: #222; }
  .ctrl-btn:active { transform: scale(0.97); }

  .ctrl-btn.inc  { border-color: #00e5a040; color: #00e5a0; }
  .ctrl-btn.inc:hover { background: #00e5a015; border-color: #00e5a0; }

  .ctrl-btn.dec  { border-color: #ff4d4d40; color: #ff4d4d; }
  .ctrl-btn.dec:hover { background: #ff4d4d15; border-color: #ff4d4d; }

  .ctrl-btn.inc10 { border-color: #6fa3ff40; color: #6fa3ff; }
  .ctrl-btn.inc10:hover { background: #6fa3ff15; border-color: #6fa3ff; }

  .ctrl-btn.reset { color: #555; font-size: 0.78rem; }

  .history {
    margin-top: 1.5rem;
    text-align: left;
    border-top: 1px solid #222;
    padding-top: 1rem;
  }
  .history-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #444;
    margin-bottom: 0.5rem;
    font-family: 'Space Mono', monospace;
  }
  #history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 28px;
  }
  .hist-chip {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    color: #555;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div class="card">
  <div class="lab-tag">Bài lab 16 · Làm quen</div>
  <h1>Bộ Đếm Lượt Tương Tác</h1>

  <div class="counter-ring">
    <svg viewBox="0 0 180 180" width="180" height="180">
      <circle class="ring-track" cx="90" cy="90" r="80"/>
      <circle id="ring-progress" cx="90" cy="90" r="80"/>
    </svg>
    <div class="counter-ring-inner">
      <div id="counter-value">0</div>
      <div id="counter-status">ZERO</div>
    </div>
  </div>

  <div class="btn-grid">
    <button class="ctrl-btn inc" id="btn-inc">＋ Tăng 1</button>
    <button class="ctrl-btn dec" id="btn-dec">－ Giảm 1</button>
    <button class="ctrl-btn inc10 btn-wide" id="btn-inc10">⚡ Tăng Nhanh +10</button>
    <button class="ctrl-btn reset btn-wide" id="btn-reset">↺ Đặt Lại Về 0</button>
  </div>

  <div class="history">
    <div class="history-label">Lịch sử thay đổi</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
$(function() {
  var count = 0;
  var history = [];

  function addHistory(delta) {
    var sign = delta > 0 ? '+' : '';
    var chip = $('<div class="hist-chip">').text(sign + delta);
    if (delta > 0) chip.css({ color: '#00e5a0', borderColor: '#00e5a030' });
    else if (delta < 0) chip.css({ color: '#ff4d4d', borderColor: '#ff4d4d30' });
    $('#history-list').prepend(chip);
    // Giữ tối đa 8 chip
    $('#history-list .hist-chip:gt(7)').remove();
  }

  function updateUI(delta) {
    var $val    = $('#counter-value');
    var $status = $('#counter-status');
    var $ring   = $('#ring-progress');

    $val.text(count);

    if (count > 0) {
      $val.css('color', '#00e5a0');
      $status.text('DƯƠNG').css('color', '#00e5a060');
      $ring.attr('stroke', '#00e5a0');
    } else if (count < 0) {
      $val.css('color', '#ff4d4d');
      $status.text('ÂM').css('color', '#ff4d4d60');
      $ring.attr('stroke', '#ff4d4d');
    } else {
      $val.css('color', '#fff');
      $status.text('ZERO').css('color', '#555');
      $ring.attr('stroke', '#444');
    }

    // Vòng tròn: ánh xạ |count| tới 0–502 (circumference)
    var pct = Math.min(Math.abs(count) / 50, 1);
    var offset = 502 - pct * 502;
    $ring.attr('stroke-dashoffset', offset);

    if (delta !== 0) addHistory(delta);
  }

  $('#btn-inc').on('click', function()  { count++; updateUI(1); });
  $('#btn-dec').on('click', function()  { count--; updateUI(-1); });
  $('#btn-inc10').on('click', function(){ count += 10; updateUI(10); });
  $('#btn-reset').on('click', function(){
    var old = count;
    count = 0;
    updateUI(old !== 0 ? -old : 0);
  });
});
</script>
</body>
</html>
